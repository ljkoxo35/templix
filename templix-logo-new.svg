<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#4f3cc9"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角方块 -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#1e1b2e"/>

  <!-- 三张层叠的页面构成 T 的横梁 -->
  <!-- 最下层页面 -->
  <g transform="translate(136, 108)">
    <rect x="0" y="0" width="240" height="68" rx="14" fill="#3d3578"/>
    <!-- 页面装饰线 -->
    <rect x="30" y="18" width="100" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="30" y="30" width="140" height="6" rx="3" fill="rgba(255,255,255,0.04)"/>
    <rect x="30" y="42" width="120" height="6" rx="3" fill="rgba(255,255,255,0.04)"/>
  </g>

  <!-- 中层页面（略微偏移，制造层次感） -->
  <g transform="translate(136, 98) rotate(0)">
    <rect x="0" y="0" width="240" height="72" rx="14" fill="#5a4fd9"/>
    <rect x="28" y="20" width="110" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="28" y="34" width="150" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="28" y="48" width="130" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  </g>

  <!-- 最上层页面（主页面） -->
  <g transform="translate(136, 88)">
    <rect x="0" y="0" width="240" height="76" rx="14" fill="url(#accentGrad)"/>
    <!-- 页面内的文字线 -->
    <rect x="32" y="22" width="120" height="7" rx="3.5" fill="#fff" opacity="0.3"/>
    <rect x="32" y="38" width="160" height="7" rx="3.5" fill="#fff" opacity="0.18"/>
    <rect x="32" y="54" width="100" height="7" rx="3.5" fill="#fff" opacity="0.12"/>
  </g>

  <!-- T 的竖柱 -->
  <g transform="translate(218, 164)">
    <rect x="0" y="0" width="76" height="212" rx="16" fill="url(#brandGrad)"/>
    <!-- 竖柱内部高光线 -->
    <rect x="16" y="18" width="44" height="176" rx="8" fill="#fff" opacity="0.06"/>
  </g>

  <!-- 金色点缀圆点 -->
  <circle cx="256" cy="320" r="9" fill="#f59e0b" opacity="0.9"/>
</svg>
