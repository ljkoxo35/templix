<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9ad60"/><stop offset="30%" stop-color="#e8d898"/><stop offset="60%" stop-color="#c9ad60"/><stop offset="100%" stop-color="#a88830"/></linearGradient>
    <linearGradient id="olive" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7d8f50"/><stop offset="100%" stop-color="#556a30"/></linearGradient>
    <linearGradient id="olive2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8f9f60"/><stop offset="100%" stop-color="#667a40"/></linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fefcfa"/><stop offset="100%" stop-color="#f6f2e8"/></linearGradient>
    <g id="olive-branch">
      <path d="M0,0 C-25,-10 -50,-25 -70,-40" stroke="url(#olive)" stroke-width="2.5" fill="none"/>
      <ellipse cx="-42" cy="-16" rx="10" ry="4" fill="url(#olive2)" transform="rotate(-20,-42,-16)"/>
      <ellipse cx="-28" cy="-10" rx="9" ry="3.5" fill="url(#olive)" transform="rotate(-10,-28,-10)"/>
      <ellipse cx="-14" cy="-4" rx="8" ry="3.5" fill="url(#olive2)" transform="rotate(0,-14,-4)"/>
      <ellipse cx="0" cy="4" rx="7" ry="3" fill="url(#olive)" transform="rotate(10,0,4)"/>
      <circle cx="-50" cy="-24" r="2.5" fill="#6a7a3e"/>
      <circle cx="-32" cy="-16" r="2.2" fill="#7d8f50"/>
      <circle cx="-18" cy="-8" r="2.5" fill="#6a7a3e"/>
    </g>
  </defs>
  <rect width="700" height="980" fill="url(#bg)"/>
  <rect x="32" y="32" width="636" height="916" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <rect x="40" y="40" width="620" height="900" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.4"/>
  <!-- Corners -->
  <g transform="translate(36,36)"><path d="M0,50 C0,18 18,0 50,0" fill="none" stroke="url(#gold)" stroke-width="1.5"/></g>
  <g transform="translate(664,36) scale(-1,1)"><path d="M0,50 C0,18 18,0 50,0" fill="none" stroke="url(#gold)" stroke-width="1.5"/></g>
  <g transform="translate(36,944) scale(1,-1)"><path d="M0,50 C0,18 18,0 50,0" fill="none" stroke="url(#gold)" stroke-width="1.5"/></g>
  <g transform="translate(664,944) scale(-1,-1)"><path d="M0,50 C0,18 18,0 50,0" fill="none" stroke="url(#gold)" stroke-width="1.5"/></g>
  <!-- Top olive -->
  <use href="#olive-branch" transform="translate(270,100)"/>
  <use href="#olive-branch" transform="translate(430,100) scale(-1,1)"/>
  <circle cx="350" cy="88" r="5" fill="url(#gold)" opacity="0.8"/>
  <!-- Text -->
  <text x="350" y="185" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#8a8050" letter-spacing="4">TOGETHER WITH THEIR FAMILIES</text>
  <text x="350" y="260" text-anchor="middle" font-family="Georgia,serif" font-size="48" fill="#3a3a2a" letter-spacing="2" font-style="italic">Emily &amp; James</text>
  <line x1="280" y1="290" x2="420" y2="290" stroke="url(#gold)" stroke-width="1"/>
  <text x="350" y="350" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#5a5040" letter-spacing="1.5">
    <tspan x="350" dy="0">request the honour of your presence</tspan>
    <tspan x="350" dy="24">at their marriage</tspan>
    <tspan x="350" dy="32">Saturday, the twenty-sixth of September</tspan>
    <tspan x="350" dy="24">Two thousand and twenty-six</tspan>
    <tspan x="350" dy="32">at four o'clock in the afternoon</tspan>
  </text>
  <line x1="300" y1="510" x2="400" y2="510" stroke="url(#gold)" stroke-width="1"/>
  <text x="350" y="560" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#3a3a2a" letter-spacing="3" font-weight="bold">THE ASHFORD ESTATE</text>
  <text x="350" y="588" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#7a7058" letter-spacing="1.5">12 Ocean Drive · Newport, Rhode Island</text>
  <!-- Bottom olive -->
  <use href="#olive-branch" transform="translate(290,680) scale(1,-1)"/>
  <use href="#olive-branch" transform="translate(410,680) scale(-1,-1)"/>
  <text x="350" y="740" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#b8a888" letter-spacing="3">DINNER &amp; DANCING TO FOLLOW</text>
  <text x="350" y="760" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#b8a888" letter-spacing="3">BLACK TIE INVITED</text>
  <!-- Brand -->
  <text x="350" y="940" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#c0b090" letter-spacing="5">LUXE TEMPLATES</text>
</svg>
